<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://127.0.0.1:* ws://127.0.0.1:*"
    />
    <meta name="color-scheme" content="light" />
    <title>Orquesta Desktop Renderer</title>
    <style>
      .startup-curtain {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: grid;
        place-items: center;
        overflow: hidden;
        isolation: isolate;
        background:
          radial-gradient(circle at 50% 45%, rgba(255,253,248,.94), rgba(250,247,239,.76) 46%, rgba(243,240,232,.96) 100%),
          #f3f0e8;
        opacity: 1;
        pointer-events: auto;
        transition: opacity 300ms ease-out;
      }
      .startup-curtain::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        background-image: url('./reference/paper-grain.png');
        background-size: 256px 256px;
        opacity: .27;
        mix-blend-mode: multiply;
        pointer-events: none;
      }
      .startup-curtain__logo {
        position: relative;
        z-index: 1;
        display: block;
        width: min(420px, 52vw, 52vh);
        height: auto;
        object-fit: contain;
        transform: translateY(0);
        transition: opacity 300ms ease-out, transform 300ms ease-out;
      }
      .startup-curtain--exiting {
        opacity: 0;
        pointer-events: none;
      }
      .startup-curtain--exiting .startup-curtain__logo {
        opacity: 0;
        transform: translateY(-24px);
      }
      @media (prefers-reduced-motion: reduce) {
        .startup-curtain,
        .startup-curtain__logo {
          transition-duration: 160ms;
        }
        .startup-curtain--exiting .startup-curtain__logo {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="startup-curtain" class="startup-curtain" aria-hidden="true">
      <img class="startup-curtain__logo" src="./brand/orquesta-startup.png" alt="" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
